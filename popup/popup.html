<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebRecorder</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>WebRecorder</h1>
      <span class="version">v1.0.0</span>
    </header>

    <main class="main">
      <!-- 状态显示 -->
      <div class="status-section">
        <div class="status-indicator" id="statusIndicator">
          <span class="status-dot" id="statusDot"></span>
          <span class="status-text" id="statusText">准备就绪</span>
        </div>
        <div class="session-info" id="sessionInfo" style="display: none;">
          <span class="request-count" id="requestCount">0 个请求</span>
          <span class="timer" id="timer">00:00</span>
        </div>
      </div>

      <!-- 控制按钮 -->
      <div class="controls">
        <button class="btn btn-primary" id="startBtn">
          <span class="btn-icon">●</span>
          <span class="btn-text">开始录制</span>
        </button>
        <button class="btn btn-danger" id="stopBtn" disabled>
          <span class="btn-icon">■</span>
          <span class="btn-text">停止录制</span>
        </button>
      </div>

      <!-- 快捷操作 -->
      <div class="quick-actions">
        <button class="btn btn-secondary" id="viewSessionsBtn">
          <span class="btn-icon">📋</span>
          <span class="btn-text">查看记录</span>
        </button>
        <button class="btn btn-secondary" id="openOptionsBtn">
          <span class="btn-icon">⚙️</span>
          <span class="btn-text">设置</span>
        </button>
      </div>

      <!-- 分割线 -->
      <div class="divider"></div>

      <!-- 域名匹配状态 -->
      <div class="domain-section" id="domainSection" style="display: none;">
        <div class="domain-status" id="domainStatus">
          <span class="domain-badge" id="domainBadge">自动</span>
          <span class="domain-text" id="domainText">匹配中...</span>
        </div>
        <div class="domain-info" id="domainInfo" style="display: none;">
          <div class="domain-match" id="domainMatch"></div>
          <div class="domain-mode" id="domainMode"></div>
        </div>
      </div>

      <!-- 回放区域 -->
      <div class="playback-section" id="playbackSection">
        <h3>回放记录</h3>
        <div class="playback-list" id="playbackList">
          <!-- 动态加载记录列表 -->
        </div>
        <div class="playback-empty" id="playbackEmpty" style="display: none;">
          <span class="empty-icon">🎬</span>
          <p>暂无可用记录</p>
        </div>
        <button class="btn btn-danger" id="stopPlaybackBtn" style="display: none; margin-top: 12px; width: 100%;">
          <span class="btn-icon">⏹</span>
          <span class="btn-text">停止回放</span>
        </button>
      </div>

      <!-- 最近记录 -->
      <div class="recent-section" id="recentSection" style="display: none;">
        <h3>最近录制</h3>
        <div class="recent-list" id="recentList">
          <!-- 动态加载 -->
        </div>
      </div>
    </main>

    <footer class="footer">
      <a href="#" id="helpLink">使用帮助</a>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
